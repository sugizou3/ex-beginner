<!doctype html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Document</title>
</head>
<body>
<h1>ユーザ登録</h1>
<form action="exam04-result.html" th:action="@{/exam04/user-registration}" method="post" th:object="${userRegistrationForm}">
    <div th:errors="*{name}" style="color:red">エラー！</div>
    <div>名前：<input type="text" name="name"/></div>

    <div th:errors="*{age}" style="color:red">エラー！</div>
    <div>年齢：<input type="text" name="age"/></div>

    <div th:errors="*{comment}" style="color:red">エラー！</div>
    <div>コメント：<br/><textarea name="comment"></textarea></div>
    <button>登録</button>
</form>
</body>
</html>
